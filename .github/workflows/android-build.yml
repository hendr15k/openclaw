name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional: Build as release for this tag (e.g., v2026.3.24)'
        required: false
        type: string

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"
          yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x apps/android/gradlew

      - name: Build Debug APK
        working-directory: apps/android
        run: ./gradlew :app:assemblePlayDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-apk
          path: apps/android/app/build/outputs/apk/play/debug/*.apk
          retention-days: 90

      - name: Create Release (if tag provided)
        if: inputs.tag != ''
        uses: softprops/action-gh-release@v1
        with:
          tag: ${{ inputs.tag }}
          files: apps/android/app/build/outputs/apk/play/debug/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
